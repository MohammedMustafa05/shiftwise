services:
  ml-engine:
    build:
      context: ./apps/ml-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shiftwise
    ports:
      - "5432:5432"
    volumes:
      - shiftwise_pg:/var/lib/postgresql/data

volumes:
  shiftwise_pg:
