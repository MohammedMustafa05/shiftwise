name: API Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shiftagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run db:migrate -w @shiftagent/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shiftagent
      - run: npm run test:api
        env:
          USE_REAL_POSTGRES: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shiftagent
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-with-at-least-32-characters-long
          CRON_SECRET: dev-cron-secret-with-32-chars-min
          TOKEN_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          CLEARVIEW_MODE: mock
          RATE_LIMIT_DISABLED: "1"

  docker-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build api ml-engine
      - run: docker compose up -d postgres redis
      - run: sleep 5
      - name: Run migrations
        run: |
          for f in supabase/migrations/*.sql; do
            docker compose exec -T postgres psql -U postgres -d shiftagent -f /dev/stdin < "$f"
          done
      - run: docker compose up -d ml-engine api
      - run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1
